version: 1
backend:
  phases:
    build:
      commands:
        - cd surveyjale
        - npm ci --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
  artifacts:
    baseDirectory: surveyjale/.amplify/artifacts/cdk.out
    files:
      - '**/*'
frontend:
  phases:
    preBuild:
      commands:
        - cd surveyjale && npm ci --cache .npm --prefer-offline
    build:
      commands:
        - cd surveyjale && npm run build
  artifacts:
    baseDirectory: surveyjale/dist
    files:
      - '**/*'
  cache:
    paths:
      - surveyjale/node_modules/**/*
      - surveyjale/.npm/**/*
