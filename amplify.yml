version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd surveyjale && npm ci --cache .npm --prefer-offline
    build:
      commands:
        - cd surveyjale && npm run build
  artifacts:
    baseDirectory: surveyjale/dist
    files:
      - '**/*'
  cache:
    paths:
      - surveyjale/node_modules/**/*
      - surveyjale/.npm/**/*
