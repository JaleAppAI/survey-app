customHeaders:
  # Security headers for all routes
  - pattern: '**/*'
    headers:
      - key: Strict-Transport-Security
        value: max-age=31536000; includeSubDomains
      - key: X-Content-Type-Options
        value: nosniff
      - key: X-Frame-Options
        value: SAMEORIGIN
      - key: Referrer-Policy
        value: strict-origin-when-cross-origin
      - key: Permissions-Policy
        # Allow microphone for voice recording feature; block camera and geolocation
        value: "microphone=(self), camera=(), geolocation=()"

  # Long-term cache for hashed JS/CSS bundles (Vite adds content hash to filenames)
  - pattern: '/assets/*.js'
    headers:
      - key: Cache-Control
        value: public, max-age=31536000, immutable

  - pattern: '/assets/*.css'
    headers:
      - key: Cache-Control
        value: public, max-age=31536000, immutable

  # index.html must never be cached — so users always get the latest build
  - pattern: '/index.html'
    headers:
      - key: Cache-Control
        value: no-cache, no-store, must-revalidate
